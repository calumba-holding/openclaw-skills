version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-cover-image
    should_trigger: true
    prompt: "Use the cover-image skill to create a blog hero image."
  - id: implicit-cover-image
    should_trigger: true
    prompt: "Create a cover image for my article with a clean 16:9 hero layout."
  - id: negative-control-rednote
    should_trigger: false
    prompt: "Split this topic into a RedNote card series with multiple connected images."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/scaffold.ts"
      - file_exists: "scripts/build-batch.ts"
